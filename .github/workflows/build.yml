name: Build ASPaper

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Apply Patches
        run: ./gradlew applyAllPatches --no-daemon
      - name: Build with Gradle
        run: |
          ./gradlew createMojmapPaperclipJar --no-daemon
          ./gradlew plugin:build -x test --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASPaper-Server-Jar
          path: |
            build/libs/*-paperclip.jar
            aspaper-server/build/libs/*-paperclip.jar
            build/libs/*mojmap*.jar
            aspaper-server/build/libs/*mojmap*.jar
            plugin/build/libs/asp-plugin-*.jar
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest ASPaper Build"
          body: "Automated build of ASPaper from commit ${{ github.sha }}"
          files: |
            build/libs/*-paperclip.jar
            aspaper-server/build/libs/*-paperclip.jar
            build/libs/*mojmap*.jar
            aspaper-server/build/libs/*mojmap*.jar
            plugin/build/libs/asp-plugin-*.jar
